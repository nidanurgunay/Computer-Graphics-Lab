    <title>Blinn-Phong</title>


    <script id="vertex-shader" type="x-shader/x-vertex">
#version 300 es

in highp vec3 in_position;
in highp vec3 in_normal;

uniform mat4 u_model;
uniform mat4 u_view;
uniform mat4 u_projection;
uniform mat3 u_normal;

out highp vec3 position;
out highp vec3 normal;


        
void main() {
    //TODO: Apply the normal matrix to the normal and only the model matrix to in_position. The result is now transfomed to world space.
    //TODO: Emmit one normal and poistion per vertex. 
    // Transform position to clip space
    gl_Position = u_projection * u_view * u_model * vec4(in_position, 1.0);

    // Transform normal to world space (without translation) using the normal matrix
    normal = normalize(u_normal * in_normal);

    // Transform position to view space for lighting calculations
    position = vec3(u_view * u_model * vec4(in_position, 1.0));
}
        
</script>

<script id="fragment-shader" type="x-shader/x-fragment">
#version 300 es

out highp vec4 out_color;
        
uniform highp vec3 u_eye;
uniform highp vec3 u_light_position;
uniform highp vec3 u_light_color;
uniform highp float u_shininess;
uniform highp vec3 u_ka;
uniform highp vec3 u_kd;
uniform highp vec3 u_ks;

in highp vec3 position;
in highp vec3 normal;

        
void main() {

    //TODO: Perform here your lighting calculation.

    highp vec3 ambient = u_ka * u_light_color;

    highp vec3 lightDir = normalize(u_light_position - position);
    highp float diff = max(dot(normalize(normal), lightDir), 0.0);
    highp vec3 diffuse = u_kd * u_light_color * diff;

    highp vec3 viewDir = normalize(u_eye - position);
    highp vec3 reflectDir = reflect(-lightDir, normalize(normal));
    highp float spec = pow(max(dot(viewDir, reflectDir), 0.0), u_shininess);
    highp vec3 specular = u_ks * u_light_color * spec;

    highp vec3 phong = ambient + diffuse + specular;
    out_color = vec4(phong, 1.0);
}
</script>
