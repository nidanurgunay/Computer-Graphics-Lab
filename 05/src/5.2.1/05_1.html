<!DOCTYPE html>

    <title>3D Sierpinski Gasket</title>


    <script id="vertex-shader" type="x-shader/x-vertex">
#version 300 es

in vec3 aPosition;
in vec3 aColor;
out vec4 vColor;
uniform mat4 uRotationMatrix;  // New uniform for rotation
void main()
{
    gl_Position = uRotationMatrix * vec4(aPosition, 1.0);
    vColor = vec4(aColor, 1.0);
}
</script>

    <script id="fragment-shader" type="x-shader/x-fragment">
#version 300 es
precision mediump float;

in vec4 vColor;
out vec4 fColor;

void main()
{
    fColor = vColor;
}
</script>
