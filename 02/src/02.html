<!DOCTYPE html>
<html>

<head>
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8">
    <title>EX 02</title>


    <script id="vertex-shader" type="x-shader/x-vertex">
#version 300 es

//TODO: change u_size to a uniform and remove the assignment
float u_size = 0.5;

in vec3 in_position;
in vec3 in_color;

out vec4 vColor;

void main()
{
    vec3 position = u_size * in_position;
    gl_Position = vec4(position, 1.0);

    vColor = vec4(in_color, 1.0);
}
</script>

    <script id="fragment-shader" type="x-shader/x-fragment">
#version 300 es
precision mediump float;

in vec4 vColor;
out vec4 fColor;

void main()
{
    fColor = vColor;
}
</script>

    <script type="text/javascript" src="initShaders.js"></script>
    <script type="text/javascript" src="02.js"></script>
</head>

<body>
    <label for="size_slider">Size:</label>
    <input type="range" value="0.5" id="size_slider" max="1" min="0.1" step="0.01"/>

    </canvas>
</body>

</html>
